name: Nightly & Manual Regression

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: nightly-regression
  cancel-in-progress: false

jobs:
  regression:
    name: Regression Shard ${{ matrix.shard }}/2
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy

    steps:
      - uses: actions/checkout@v4
      - run: npm ci

      # 🐸 SKELETON NOTE:
      # Regression tests usually cover complex scenarios. 
      # In this skeleton, we use sharding to demonstrate scalability.
      - name: Run regression shard
        # Note: Using project 'chromium' instead of 'regression-chrome'
        run: npx playwright test --project=chromium --shard=${{ matrix.shard }}/2 --reporter=blob
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://example.com' }}
          API_URL: ${{ secrets.API_URL || 'https://example.com' }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME || 'admin' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'password123' }}
          CI: 'true'

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 14

      - name: Upload traces & screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-artifacts-${{ matrix.shard }}
          path: test-results/
          retention-days: 14

  merge-reports:
    name: Merge Shard Reports
    if: always()
    needs: regression
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge into HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-merged-report
          path: playwright-report
          retention-days: 14
