name: PR Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: TypeScript
        run: npm run typecheck

  smoke:
    name: UI & API Smoke
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      
      # 🐸 SKELETON NOTE:
      # By default, these tests might fail if they require a real environment.
      # In the skeleton, we run them against the projects defined in playwright.config.ts.
      # Update BASE_URL and secrets when you connect your real app.
      - name: Run smoke tests
        run: npx playwright test --project=chromium --project=api --grep @smoke
        env:
          # These secrets should be configured in your GitHub Repository settings
          BASE_URL: ${{ secrets.BASE_URL || 'https://example.com' }}
          API_URL: ${{ secrets.API_URL || 'https://example.com' }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME || 'admin' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'password123' }}
          CI: 'true'

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr
          path: |
            playwright-report/
            test-results/
          retention-days: 7
